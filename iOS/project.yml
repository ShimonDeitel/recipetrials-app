name: Recipe Trials
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  RecipeTrials:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RecipeTrials
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recipelog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RecipeTrials/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: RecipeTrials/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  RecipeTrialsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RecipeTrialsTests
    dependencies:
      - target: RecipeTrials
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  RecipeTrialsUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RecipeTrialsUITests
    dependencies:
      - target: RecipeTrials
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  RecipeTrials:
    build:
      targets:
        RecipeTrials: all
    test:
      targets:
        - RecipeTrialsTests
        - RecipeTrialsUITests
    run:
      config: Debug
